# =============================================================================
# EpiLongAI — Conda environment for Snakemake --use-conda
# =============================================================================
name: epilongai
channels:
  - conda-forge
  - pytorch
  - bioconda
  - defaults
dependencies:
  - python>=3.10
  - pytorch>=2.0
  - numpy>=1.24
  - pandas>=2.0
  - polars>=0.20
  - scikit-learn>=1.3
  - scipy>=1.11
  - pysam>=0.22
  - pyfaidx>=0.7
  - matplotlib>=3.7
  - seaborn>=0.12
  - tqdm>=4.65
  - pyyaml>=6.0
  - pip
  - pip:
      - typer[all]>=0.9
      - loguru>=0.7
      - shap>=0.42
      - captum>=0.6
      - snakemake>=8.0
