apiVersion: apps/v1
kind: Deployment
metadata:
  name: epilongai-api
  namespace: epilongai
  labels:
    app.kubernetes.io/name: epilongai
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: epilongai
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: epilongai
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: epilongai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: epilongai-config
            - secretRef:
                name: epilongai-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            # The /health endpoint returns model_loaded — the app should
            # only serve traffic once the model checkpoint is loaded.
          volumeMounts:
            - name: config
              mountPath: /app/configs/train.yaml
              subPath: train.yaml
              readOnly: true
            - name: checkpoints
              mountPath: /app/checkpoints
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: epilongai-config
        - name: checkpoints
          persistentVolumeClaim:
            claimName: epilongai-checkpoints
        - name: tmp
          emptyDir:
            sizeLimit: 500Mi
      terminationGracePeriodSeconds: 30
---
# PVC for model checkpoints — adjust storageClassName for your cluster
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: epilongai-checkpoints
  namespace: epilongai
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
  # storageClassName: gp3  # uncomment and set for your cloud provider
