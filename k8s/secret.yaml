# =============================================================================
# EpiLongAI — Secrets
# =============================================================================
# IMPORTANT: Replace placeholder values before applying.
# In production, use an external secret manager (Vault, AWS Secrets Manager,
# sealed-secrets, etc.) instead of checking secrets into version control.
#
# To base64-encode a value:
#   echo -n "your-secret-value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: epilongai-secrets
  namespace: epilongai
  labels:
    app.kubernetes.io/name: epilongai
type: Opaque
data:
  # Replace with your base64-encoded API key
  EPILONGAI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  # Optional: external service credentials
  # DATABASE_URL: ""
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""
